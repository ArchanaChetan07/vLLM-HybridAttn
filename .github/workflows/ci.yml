name: CI

on:
  push:
    branches: [main, master, feature/minicpm-sala-model, feature/minicpm-sala-sparse, feature/pr1-upstream-staging]
  pull_request:
    branches: [main, master, feature/pr1-upstream-staging]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint and format
        run: |
          uv tool run ruff check vllm/ pr2/vllm/
          uv tool run ruff format --check vllm/ pr2/vllm/

  sync-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PR1/PR2 lightning drift gate
        run: python3 scripts/check_pr1_pr2_lightning_sync.py

  pr1-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PR1 gate
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/deliverable/minicpm_sala_stage1_pr" \
            nvidia/cuda:12.4.1-devel-ubuntu22.04 \
            bash /deliverable/minicpm_sala_stage1_pr/docker_run_pr1.sh
